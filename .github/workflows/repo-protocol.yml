name: Repo Protocol

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  protocol:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Protocol gate
        run: python -m src.cli.check_repo_protocol
