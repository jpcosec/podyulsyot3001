version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: React 18 + Vite + React Router v6
  - ui_library: Custom CSS (Terran Command dark theme) + Material Symbols Outlined icons + ReactFlow
  - other: FastAPI backend at http://127.0.0.1:8010

routes:
  - path: /
    file: apps/review-workbench/src/pages/PortfolioPage.tsx
    auth_required: false
    description: Application portfolio dashboard - shows review queue, job stats, job tree, and developer tools
  - path: /explorer
    file: apps/review-workbench/src/pages/DataExplorerPage.tsx
    auth_required: false
    description: File browser for data/jobs/ directory - browse folders, preview JSON/Markdown/images
  - path: /sandbox
    file: apps/review-workbench/src/sandbox/pages/SandboxPage.tsx
    auth_required: false
    description: Component sandbox index page
  - path: /sandbox/text_tagger
    file: apps/review-workbench/src/sandbox/pages/TextTaggerPage.tsx
    auth_required: false
    description: Text-to-node tagging sandbox
  - path: /sandbox/cv_graph
    file: apps/review-workbench/src/sandbox/pages/CvGraphEditorPage.tsx
    auth_required: false
    description: CV graph editor sandbox
  - path: /sandbox/node_editor
    file: apps/review-workbench/src/sandbox/pages/NodeEditorSandboxPage.tsx
    auth_required: false
    description: Node editor sandbox
  - path: /jobs/:source/:jobId
    file: apps/review-workbench/src/pages/JobStagePage.tsx
    auth_required: false
    description: Job workspace - evidence bank, graph explorer, extraction view, documents view
  - path: /jobs/:source/:jobId/deployment
    file: apps/review-workbench/src/pages/DeploymentPage.tsx
    auth_required: false
    description: Mission status and deployment checklist for a job
  - path: /jobs/:source/:jobId/node-editor
    file: apps/review-workbench/src/pages/JobNodeEditorPage.tsx
    auth_required: false
    description: Node editor for a specific job

features:
  - name: Portfolio Dashboard
    description: Shows all jobs in a tree view with stats, review queue highlighting, and developer tools
    files:
      - apps/review-workbench/src/pages/PortfolioPage.tsx
      - apps/review-workbench/src/components/JobTree.tsx
    entry_route: /
    user_interactions:
      - View total job stats (total, pending review, completed, failed)
      - View next review target job with source, job ID, and current node
      - Click "Open job workspace" link to navigate to a job
      - Browse jobs in collapsible tree organized by source and status
      - Click "Browse all local job artifacts" link to go to Data Explorer
      - Expand "Developer Tools" section to see sandbox links and boot sequence
    api_calls:
      - method: GET
        endpoint: /api/v1/portfolio/summary
    auth_required: false

  - name: Data Explorer
    description: Browse the data/jobs/ directory tree and preview file contents inline
    files:
      - apps/review-workbench/src/pages/DataExplorerPage.tsx
      - apps/review-workbench/src/api/client.ts
    entry_route: /explorer
    user_interactions:
      - View root directory listing of data/jobs/
      - Click on a folder to navigate into it (updates ?path= query param)
      - Click on a file to preview its contents
      - Use breadcrumb navigation to go back up the directory tree
      - View JSON files pretty-printed
      - View text/markdown files as plain text
      - View image files (PNG/JPG/GIF/SVG) inline
      - See size indicator for files
      - See item count for directories
    api_calls:
      - method: GET
        endpoint: /api/v1/explorer/browse
    auth_required: false

  - name: Job Workspace
    description: Multi-view workspace for reviewing a job's pipeline state, evidence, graph, and documents
    files:
      - apps/review-workbench/src/pages/JobStagePage.tsx
      - apps/review-workbench/src/components/JobWorkspaceSidebar.tsx
      - apps/review-workbench/src/components/GraphCanvas.tsx
    entry_route: /jobs/:source/:jobId
    user_interactions:
      - View job sidebar with source, job ID, current node status
      - Navigate between Evidence Bank, Graph Explorer, Extraction, Documents via sidebar
      - View graph of pipeline nodes in ReactFlow canvas
      - View extraction data (requirements, constraints, text spans)
      - View and edit documents (motivation letter, CV, email)
      - Jump to any stage via Stage Jump links in sidebar
    api_calls:
      - method: GET
        endpoint: /api/v1/jobs/:source/:jobId/timeline
      - method: GET
        endpoint: /api/v1/jobs/:source/:jobId/view1
      - method: GET
        endpoint: /api/v1/jobs/:source/:jobId/view2
      - method: GET
        endpoint: /api/v1/jobs/:source/:jobId/view3
      - method: GET
        endpoint: /api/v1/jobs/:source/:jobId/evidence-bank
      - method: GET
        endpoint: /api/v1/jobs/:source/:jobId/profile/summary
    auth_required: false

  - name: Deployment Page
    description: Mission status checklist showing which stages are complete and enabling application submission
    files:
      - apps/review-workbench/src/pages/DeploymentPage.tsx
    entry_route: /jobs/:source/:jobId/deployment
    user_interactions:
      - View mission status (bundle pending/ready)
      - View checklist of completed stages with check_circle icons
      - See "Submit Application" button (disabled until all stages complete)
      - View resume command for continuing pipeline
    api_calls:
      - method: GET
        endpoint: /api/v1/jobs/:source/:jobId/timeline
      - method: GET
        endpoint: /api/v1/jobs/:source/:jobId/package/files
    auth_required: false

known_limitations:
  - issue: Evidence Bank and Graph Explorer nav links share the same URL so both highlight active simultaneously
    location: apps/review-workbench/src/components/JobWorkspaceSidebar.tsx
    impact: Minor UX confusion - two nav items appear active on the same page
  - issue: ScrapeDiagnosticsTab component referenced in checklist but not implemented
    location: apps/review-workbench/src/
    impact: Scrape diagnostics only accessible via Pipeline Outputs generic view
  - issue: Submit Application button always disabled - no backend endpoint for actual submission
    location: apps/review-workbench/src/pages/DeploymentPage.tsx
    impact: Deployment action is UI-only placeholder
