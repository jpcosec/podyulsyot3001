version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: React 18 + Vite
  - ui_library: Tailwind CSS v4, lucide-react
  - other: react-router-dom v6, @tanstack/react-query v5, VITE_MOCK=true mock layer
routes:
  - path: /
    file: src/pages/global/PortfolioDashboard.tsx
    auth_required: false
    description: Application portfolio — table of all jobs with status badges. Two mock jobs available (201397 pending_hitl, 999001 completed).
  - path: /explorer
    file: src/pages/global/DataExplorer.tsx
    auth_required: false
    description: Data explorer stub (not yet implemented)
  - path: /cv
    file: src/pages/global/BaseCvEditor.tsx
    auth_required: false
    description: Base CV editor stub (not yet implemented)
  - path: /jobs/:source/:jobId
    file: src/pages/job/JobFlowInspector.tsx
    auth_required: false
    description: Job Flow Inspector — shows pipeline timeline, HITL banner if pending_hitl, job metadata. Mock jobs tu_berlin/201397 (pending_hitl) and tu_berlin/999001 (completed).
  - path: /jobs/:source/:jobId/scrape
    file: src/pages/job/ScrapeDiagnostics.tsx
    auth_required: false
    description: Scrape diagnostics stub
  - path: /jobs/:source/:jobId/extract
    file: src/pages/job/ExtractUnderstand.tsx
    auth_required: false
    description: Extract & Understand stub
  - path: /jobs/:source/:jobId/match
    file: src/pages/job/Match.tsx
    auth_required: false
    description: Match view stub
  - path: /jobs/:source/:jobId/sculpt
    file: src/pages/job/GenerateDocuments.tsx
    auth_required: false
    description: Generate Documents stub
  - path: /jobs/:source/:jobId/deployment
    file: src/pages/job/PackageDeployment.tsx
    auth_required: false
    description: Package & Deployment stub
features:
  - name: Job Flow Inspector
    description: >
      Shows the full pipeline timeline for a job. Each stage has a colored status dot and name.
      Completed/approved stages show filled dot (●). Pending stages show empty dot (○).
      The active HITL stage (needs_review) shows a pulsing dot.
      When status is pending_hitl, an amber HitlCtaBanner appears with a "GO TO REVIEW →" button.
      Clicking "GO TO REVIEW →" navigates to the current node's route.
      JobMetaPanel shows thread_id, status, and updated_at.
      Job 201397: status=pending_hitl, current_node=review_match, stages include scrape/translate/extract/match (approved), review_match (needs_review), generate_documents/render/package (pending).
      Job 999001: status=completed, all stages approved, no HitlCtaBanner.
    files:
      - src/pages/job/JobFlowInspector.tsx
      - src/features/job-pipeline/api/useJobTimeline.ts
      - src/features/job-pipeline/components/PipelineTimeline.tsx
      - src/features/job-pipeline/components/StageRow.tsx
      - src/features/job-pipeline/components/HitlCtaBanner.tsx
      - src/features/job-pipeline/components/JobMetaPanel.tsx
    entry_route: /jobs/tu_berlin/201397
    user_interactions:
      - Wait for Loading... to disappear (80ms mock delay)
      - View job heading "201397" with source "/ tu_berlin"
      - View HITL banner "HUMAN REVIEW REQUIRED — REVIEW_MATCH" (only for 201397)
      - Click "GO TO REVIEW →" button to navigate to /jobs/tu_berlin/201397/match
      - View pipeline timeline with stage rows (scrape, translate_if_needed, extract_understand, match, review_match, generate_documents, render, package)
      - Approved stages show filled dot ●, pending stages show empty dot ○
      - View JobMetaPanel with Thread ID "tu_berlin_201397", Status "pending_hitl", Updated At date
      - Navigate to /jobs/tu_berlin/999001 — no HitlCtaBanner, all stages show ●
      - Click a stage name button to navigate to its corresponding route
    api_calls:
      - method: GET
        endpoint: /api/v2/query/jobs/:source/:jobId/timeline
    auth_required: false
  - name: Portfolio Dashboard
    description: Displays all application jobs in a table with status badges. Clicking a row navigates to the job workspace.
    files:
      - src/pages/global/PortfolioDashboard.tsx
      - src/features/portfolio/components/PortfolioTable.tsx
      - src/features/portfolio/api/usePortfolioSummary.ts
    entry_route: /
    user_interactions:
      - View heading "Application Portfolio"
      - View table with job rows for 201397 and 999001
      - Click a row to navigate to /jobs/tu_berlin/:jobId
    api_calls:
      - method: GET
        endpoint: /api/v2/query/portfolio/summary
    auth_required: false
  - name: Global Left Navigation
    description: Fixed left sidebar always visible. Links to Portfolio, Explorer, Base CV.
    files:
      - src/components/layouts/AppShell.tsx
    entry_route: /
    user_interactions:
      - Click Portfolio icon → /
      - Click Explorer icon → /explorer
      - Click Base CV icon → /cv
    api_calls: []
    auth_required: false
  - name: Job Workspace Shell
    description: Pipeline topbar with breadcrumb and step tabs (Flow, Scrape, Extract, Match, Sculpt, Deployment).
    files:
      - src/components/layouts/JobWorkspaceShell.tsx
    entry_route: /jobs/tu_berlin/201397
    user_interactions:
      - View breadcrumb with Portfolio link, source, jobId
      - Click pipeline step tabs to navigate between job views
    api_calls: []
    auth_required: false
known_limitations:
  - issue: All job sub-pages except JobFlowInspector (B1–B5) are stubs with placeholder text
    location: src/pages/job/
    impact: Navigation works but no real content yet
  - issue: Artifact links in StageRow navigate to # (Data Explorer not yet implemented)
    location: src/features/job-pipeline/components/StageRow.tsx
    impact: Artifact links are visible but non-functional
  - issue: VITE_MOCK=true baked into production build — no real API calls
    location: vite.config.ts
    impact: All data comes from mock fixtures
